<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청춘 기억 저장소</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="quizData.js"></script>
<style>
:root{--bg:#FDF6EC;--primary:#1A3C34;--accent:#E67E22;--text:#2C3E50;--white:#fff;--green:#A5D6A7;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Gowun Batang',serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--primary);color:var(--white);padding:1.2rem;text-align:center;box-shadow:0 4px 6px rgba(0,0,0,.1);}
header h1{font-size:2rem;display:flex;align-items:center;justify-content:center;gap:10px;}
#home{flex:1;padding:1.5rem;overflow-y:auto;background:linear-gradient(to bottom,#FDF6EC,#F2E8DA);}
.intro{text-align:center;margin-bottom:2rem;}
.intro h2{font-size:2.2rem;color:var(--primary);}
.intro p{font-size:1.3rem;color:#666;}
.month-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;max-width:1200px;margin:0 auto;}
.month-box{background:var(--white);border:2px solid var(--green);border-radius:20px;padding:1.2rem;box-shadow:0 4px 10px rgba(0,0,0,.05);}
.month-box h4{font-size:1.6rem;color:#2E7D32;margin-bottom:1rem;border-bottom:2px solid #C8E6C9;padding-bottom:.5rem;display:flex;align-items:center;gap:8px;}
.week-chips{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.week-btn{background:#F1F8E9;border:1px solid var(--green);padding:.8rem;border-radius:12px;font-size:1.2rem;font-weight:bold;color:var(--primary);cursor:pointer;transition:all .2s;font-family:'Gowun Batang',serif;}
.week-btn:hover{background:var(--primary);color:white;}
.week-btn:disabled{opacity:.4;cursor:not-allowed;background:#eee;}
#quiz{flex:1;display:none;flex-direction:column;padding:1rem;max-width:800px;margin:0 auto;width:100%;}
.qheader{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.badge{background:var(--primary);color:white;padding:.6rem 1.4rem;border-radius:25px;font-size:1.3rem;font-weight:bold;}
.prog{font-size:1.4rem;font-weight:bold;color:var(--primary);}
.card{background:var(--white);flex:1;border-radius:30px;padding:2.5rem;box-shadow:0 10px 30px rgba(0,0,0,.08);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;margin-bottom:1rem;border:4px solid #F0F4C3;}
.qtext{font-size:2.5rem;font-weight:700;color:var(--primary);word-break:keep-all;margin-bottom:2rem;white-space:pre-wrap;}
.hint-box{display:none;background:#FFF9C4;padding:1rem;border-radius:15px;font-size:1.4rem;color:#F57F17;margin-bottom:1.5rem;width:100%;border-left:8px solid #FBC02D;}
.actions{display:flex;gap:15px;width:100%;}
.btn-action{flex:1;padding:1.2rem;font-size:1.6rem;font-weight:bold;border-radius:15px;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:10px;color:white;font-family:'Gowun Batang',serif;}
.btn-hint{background:#F39C12;}
.btn-ans{background:#3498DB;}
.answer{display:none;font-size:3.5rem;color:var(--accent);font-weight:bold;background:#FFF3E0;padding:1rem 2rem;border-radius:20px;border:5px dashed var(--accent);width:100%;}
.nav{background:var(--white);padding:1.2rem;display:flex;gap:15px;box-shadow:0 -5px 15px rgba(0,0,0,.05);}
.nav-btn{flex:1;padding:1rem;font-size:1.5rem;font-weight:bold;border:none;border-radius:18px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;font-family:'Gowun Batang',serif;}
.btn-home{background:#7F8C8D;}
.btn-prev{background:#95A5A6;}
.btn-next{background:var(--primary);}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;}
</style>
</head>
<body>
<header><h1 id="title"><i data-lucide="brain-circuit"></i> 청춘 기억 저장소</h1></header>

<main id="home">
  <div class="intro">
    <h2>어르신, 오늘은 몇 월 문제를 풀까요?</h2>
    <p>매주 새로운 퀴즈로 뇌를 건강하게 지켜보세요!</p>
  </div>
  <div id="dashboard" class="month-grid"></div>
</main>

<main id="quiz" style="display:none;flex-direction:column;">
  <div class="qheader">
    <span id="category" class="badge">카테고리</span>
    <span id="progress" class="prog">1 / 20</span>
  </div>
  <div class="card">
    <div id="question" class="qtext">질문</div>
    <div id="hint-box" class="hint-box">💡 힌트: <span id="hint-text"></span></div>
    <div style="width:100%">
      <div id="answer" class="answer"></div>
      <div id="actions" class="actions">
        <button class="btn-action btn-hint" onclick="showHint()"><i data-lucide="lightbulb"></i> 힌트 보기</button>
        <button class="btn-action btn-ans" onclick="checkAnswer()"><i data-lucide="help-circle"></i> 정답 확인</button>
      </div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn btn-home" onclick="goHome()"><i data-lucide="home"></i> 홈</button>
    <button id="prev-btn" class="nav-btn btn-prev" onclick="prev()"><i data-lucide="chevron-left"></i> 이전</button>
    <button id="next-btn" class="nav-btn btn-next" onclick="next()"><span>다음</span> <i data-lucide="chevron-right"></i></button>
  </div>
</main>

<script>
let weekIdx=0, qIdx=0, set=[];

const MONTHS=[
  {name:"5월 🌸",weeks:["1주차","2주차","3주차","4주차"],indices:[0,1,2,3]},
  {name:"6월 ☔",weeks:["1주차","2주차","3주차","4주차"],indices:[4,5,6,7]},
  {name:"7월 ☀️",weeks:["1주차","2주차","3주차","4주차"],indices:[8,9,10,11]},
  {name:"8월 🌻",weeks:["1주차","2주차","3주차","4주차"],indices:[12,13,14,15]},
  {name:"9월 🍂",weeks:["1주차","2주차","3주차","4주차"],indices:[16,17,18,19]},
  {name:"10월 🍁",weeks:["1주차","2주차","3주차","4주차"],indices:[20,21,22,23]},
  {name:"11월 🍃",weeks:["1주차","2주차","3주차","4주차"],indices:[24,25,26,27]},
  {name:"12월 ❄️",weeks:["1주차","2주차","3주차","4주차"],indices:[28,29,30,31]}
];

function playDingDong(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523.25,0],[659.25,.12],[783.99,.24]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(.3,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.01,ctx.currentTime+t+.5);
      o.connect(g);g.connect(ctx.destination);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.6);
    });
  }catch(e){}
}

function init(){
  lucide.createIcons();
  const db=document.getElementById('dashboard');
  db.innerHTML='';
  MONTHS.forEach(m=>{
    const box=document.createElement('div');
    box.className='month-box';
    box.innerHTML=`<h4><i data-lucide="calendar"></i>${m.name}</h4>`;
    const chips=document.createElement('div');
    chips.className='week-chips';
    m.weeks.forEach((w,i)=>{
      const btn=document.createElement('button');
      btn.className='week-btn';
      btn.textContent=w;
      const idx=m.indices[i];
      const hasData=Array.isArray(WEEKLY_QUIZ_DATA[idx])&&WEEKLY_QUIZ_DATA[idx].length>0;
      if(!hasData){btn.disabled=true;btn.title='준비 중';}
      else btn.onclick=()=>startWeek(idx,m.name+' '+w);
      chips.appendChild(btn);
    });
    box.appendChild(chips);
    db.appendChild(box);
  });
  lucide.createIcons();
}

function startWeek(idx,label){
  set=WEEKLY_QUIZ_DATA[idx];
  weekIdx=idx;
  if(!set||!set.length){alert('데이터가 없어요.');return;}
  document.getElementById('title').innerHTML=`<i data-lucide="brain-circuit"></i> ${label}`;
  document.getElementById('home').style.display='none';
  const q=document.getElementById('quiz');
  q.style.display='flex';
  qIdx=0;
  render();
  lucide.createIcons();
}

function render(){
  const q=set[qIdx];
  document.getElementById('category').textContent=q.category;
  document.getElementById('question').textContent=q.question;
  document.getElementById('progress').textContent=`${qIdx+1} / ${set.length}`;
  document.getElementById('hint-text').textContent=q.hint||'';
  document.getElementById('hint-box').style.display='none';
  document.getElementById('answer').style.display='none';
  document.getElementById('answer').textContent=q.answer;
  document.getElementById('actions').style.display='flex';
  document.getElementById('prev-btn').disabled=qIdx===0;
  const nb=document.getElementById('next-btn');
  nb.innerHTML=qIdx===set.length-1?'<span>완료!</span> <i data-lucide="check-circle"></i>':'<span>다음</span> <i data-lucide="chevron-right"></i>';
  lucide.createIcons();
}

function showHint(){document.getElementById('hint-box').style.display='block';}
function checkAnswer(){
  document.getElementById('actions').style.display='none';
  document.getElementById('answer').style.display='block';
  playDingDong();
}
function next(){
  if(qIdx<set.length-1){qIdx++;render();}
  else{alert('축하합니다! 이번 주 문제를 모두 풀었습니다.');goHome();}
}
function prev(){if(qIdx>0){qIdx--;render();}}
function goHome(){
  if(confirm('홈으로 돌아가시겠습니까?')){
    document.getElementById('home').style.display='block';
    document.getElementById('quiz').style.display='none';
    document.getElementById('title').innerHTML='<i data-lucide="brain-circuit"></i> 청춘 기억 저장소';
    lucide.createIcons();
  }
}
window.onload=init;
</script>
</body>
</html>
