<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청춘 기억 저장소</title>
<!-- 구글 웹폰트: 가독성이 높고 전통적이면서 세련된 '고운 바탕' 폰트 연동 -->
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<!-- 현대적인 벡터 아이콘 라이브러리 Lucide CDN 연동 -->
<script src="https://unpkg.com/lucide@latest"></script>
<!-- 퀴즈 데이터를 담고 있는 외부 자바스크립트 파일 로드 -->
<script src="quizData.js"></script>

<style>
/* 전역 변수 설정: 눈이 편안한 파스텔톤 그린(#1A3C34), 따뜻한 오렌지(#E67E22), 포근한 크림색 배경(#FDF6EC) */
:root {
  --bg: #FDF6EC;
  --primary: #1A3C34;
  --accent: #E67E22;
  --text: #2C3E50;
  --white: #ffffff;
  --green: #A5D6A7;
  --card-bg: rgba(255, 255, 255, 0.95);
  --shadow: 0 15px 35px rgba(26, 60, 52, 0.08);
  --shadow-hover: 0 25px 50px rgba(26, 60, 52, 0.15);
}

/* 스크롤바 디자인 최적화 (어르신들이 다루기 편리하도록 둥글고 부드러운 형태로 마감) */
::-webkit-scrollbar {
  width: 10px;
}
::-webkit-scrollbar-track {
  background: rgba(242, 232, 218, 0.5);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb {
  background: var(--green);
  border-radius: 10px;
  border: 2px solid #FDF6EC;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--primary);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* 화면 전체의 불필요한 스크롤은 숨기고, 내부 컨텐츠만 자연스럽게 스크롤 되도록 유도 */
body {
  font-family: 'Gowun Batang', serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* 마우스를 따라 은은하게 움직이는 현대적인 배경 조명 효과(Glow Effect) */
.bg-glow {
  position: fixed;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(165, 214, 167, 0.2) 0%, rgba(230, 126, 34, 0.06) 40%, transparent 70%);
  border-radius: 50%;
  pointer-events: none; /* 마우스 클릭 등을 방해하지 않도록 터치 제외 */
  transform: translate(-50%, -50%);
  z-index: 0; /* 배경 레이어로 위치 지정 */
  transition: left 0.15s cubic-bezier(0.25, 0.8, 0.25, 1), top 0.15s cubic-bezier(0.25, 0.8, 0.25, 1);
  will-change: left, top;
}

header {
  background: var(--primary);
  color: var(--white);
  padding: 1.2rem;
  text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,.15);
  z-index: 10;
  border-bottom: 3px solid var(--green);
}
header h1 {
  font-size: 2.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}

/* 홈 화면 디자인 최적화 */
#home {
  flex: 1;
  padding: 2rem;
  overflow-y: auto;
  background: linear-gradient(to bottom, #FDF6EC, #F2E8DA);
  z-index: 5;
}
.intro {
  text-align: center;
  margin-bottom: 2.5rem;
}
.intro h2 {
  font-size: 2.4rem;
  color: var(--primary);
  margin-bottom: 0.5rem;
}
.intro p {
  font-size: 1.4rem;
  color: #555;
}

.month-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}
.month-box {
  background: var(--white);
  border: 2px solid var(--green);
  border-radius: 24px;
  padding: 1.5rem;
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
}
.month-box:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
}
.month-box h4 {
  font-size: 1.7rem;
  color: #2E7D32;
  margin-bottom: 1.2rem;
  border-bottom: 2px solid #C8E6C9;
  padding-bottom: .6rem;
  display: flex;
  align-items: center;
  gap: 10px;
}
.week-chips {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.week-btn {
  background: #F1F8E9;
  border: 1px solid var(--green);
  padding: .9rem;
  border-radius: 16px;
  font-size: 1.25rem;
  font-weight: bold;
  color: var(--primary);
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: 'Gowun Batang', serif;
}
.week-btn:hover {
  background: var(--primary);
  color: white;
  transform: scale(1.03);
}
.week-btn:disabled {
  opacity: .35;
  cursor: not-allowed;
  background: #eee;
  border-color: #ccc;
}

/* 퀴즈 메인 컨테이너: 뷰포트 높이에 맞춤 설계하여 절대 밖으로 밀려나지 않음 */
#quiz {
  flex: 1;
  display: none;
  flex-direction: column;
  padding: 1.5rem;
  max-width: 850px;
  margin: 0 auto;
  width: 100%;
  height: calc(100vh - 90px); /* 헤더를 제외한 높이 100% 사용 */
  z-index: 5;
}

.qheader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.2rem;
  flex-shrink: 0; /* 헤더는 크기가 줄어들지 않도록 고정 */
}
.badge {
  background: var(--primary);
  color: white;
  padding: .6rem 1.6rem;
  border-radius: 25px;
  font-size: 1.35rem;
  font-weight: bold;
  box-shadow: 0 4px 8px rgba(26,60,52,0.15);
}
.prog {
  font-size: 1.45rem;
  font-weight: bold;
  color: var(--primary);
}

/* 프리미엄 3D 퀴즈 카드 디자인 */
.card {
  background: var(--card-bg);
  backdrop-filter: blur(12px); /* 글래스모피즘 효과 */
  -webkit-backdrop-filter: blur(12px);
  flex: 1;
  border-radius: 35px;
  padding: 2.5rem;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  margin-bottom: 1.2rem;
  border: 4px solid #F0F4C3;
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.3s ease, transform 0.1s ease-out; /* 마우스 움직임에 쫀득하게 반응 */
  transform-style: preserve-3d; /* 입체 효과 극대화 */
  perspective: 1000px;
  min-height: 0; /* flex 자식 요소의 오버플로우 방지를 위한 핵심 설정 */
}

/* 카드 내부 스크롤 가능한 컨텐츠 영역 */
.card-scroll-area {
  flex: 1;
  overflow-y: auto; /* 본문이 길어지면 여기에만 스크롤바가 생김 */
  width: 100%;
  padding-right: 8px; /* 스크롤바 여유 공간 */
  margin-bottom: 1.5rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 0;
}

.qtext {
  font-size: 2.5rem;
  font-weight: 700;
  color: var(--primary);
  word-break: keep-all;
  margin-bottom: 2rem;
  white-space: pre-wrap;
  text-align: center;
  line-height: 1.5;
  transform: translateZ(30px); /* 3D 기울기 시 글씨가 살짝 튀어나와 보이도록 입체 처리 */
}

.hint-box {
  display: none;
  background: #FFF9C4;
  padding: 1.2rem;
  border-radius: 20px;
  font-size: 1.5rem;
  color: #F57F17;
  margin-bottom: 1.5rem;
  width: 100%;
  border-left: 8px solid #FBC02D;
  box-shadow: 0 4px 10px rgba(245,127,23,0.08);
  transform: translateZ(20px);
}

/* 큼직하고 뚜렷하게 단독 노출되는 프리미엄 정답판 */
.answer {
  display: none;
  font-size: 3.5rem;
  color: var(--accent);
  font-weight: bold;
  background: #FFF3E0;
  padding: 1.2rem 2rem;
  border-radius: 24px;
  border: 5px dashed var(--accent);
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 20px rgba(230,126,34,0.1);
  opacity: 0;
  transform: scale(0.9) translateZ(25px); /* 3D 카드 틸팅 궤적과 동일하게 입체 매핑 */
  transition: opacity 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
}
.answer.show {
  display: block;
  opacity: 1;
  transform: scale(1) translateZ(25px);
}

/* 카드 하단 액션 버튼 배치 영역 */
.actions {
  display: flex;
  gap: 15px;
  width: 100%;
  flex-shrink: 0; /* 줄어들지 않도록 설정 */
  transform: translateZ(15px);
}

/* 액션 버튼 공통 스타일 및 미크로 애니메이션 효과 */
.btn-action {
  flex: 1;
  padding: 1.2rem;
  font-size: 1.6rem;
  font-weight: bold;
  border-radius: 18px;
  cursor: pointer;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: white;
  font-family: 'Gowun Batang', serif;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}
.btn-action:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.18);
}
.btn-action:active {
  transform: translateY(1px);
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.btn-hint { background: #F39C12; }
.btn-ans { background: #3498DB; }

/* 하단 네비게이션: 절대 밀려나지 않고 화면 하단에 안전하게 안착 */
.nav {
  background: var(--white);
  padding: 1.2rem;
  display: flex;
  gap: 15px;
  box-shadow: 0 -5px 20px rgba(26,60,52,0.06);
  border-radius: 24px;
  flex-shrink: 0; /* 절대 찌그러지거나 잘리지 않도록 고정 */
}
.nav-btn {
  flex: 1;
  padding: 1.1rem;
  font-size: 1.55rem;
  font-weight: bold;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  font-family: 'Gowun Batang', serif;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
}
.nav-btn:not(:disabled):hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}
.nav-btn:not(:disabled):active {
  transform: translateY(1px);
}
.btn-home { background: #7F8C8D; }
.btn-prev { background: #95A5A6; }
.btn-next { background: var(--primary); }
.nav-btn:disabled {
  opacity: .3;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}
</style>
</head>
<body>
<!-- 마우스의 유기적 모션을 부드럽게 쫓아다니는 은은한 배경 조명 레이어 -->
<div class="bg-glow"></div>

<header>
  <h1 id="title"><i data-lucide="brain-circuit"></i> 청춘 기억 저장소</h1>
</header>

<!-- 메인 대시보드 화면 -->
<main id="home">
  <div class="intro">
    <h2>어르신, 오늘은 몇 월 문제를 풀까요?</h2>
    <p>매주 새로운 퀴즈로 뇌를 건강하게 지켜보세요!</p>
  </div>
  <div id="dashboard" class="month-grid"></div>
</main>

<!-- 퀴즈 게임 화면: 화면 하단에 버튼 바가 항상 안전하게 고정됨 -->
<main id="quiz">
  <div class="qheader">
    <span id="category" class="badge">카테고리</span>
    <span id="progress" class="prog">1 / 20</span>
  </div>
  
  <!-- 3D 회전 카드 몸체 -->
  <div class="card" id="quiz-card">
    <!-- 카드 내부 콘텐츠 영역: 내용이 넘치면 여기에만 스크롤막대가 생성됨 -->
    <div class="card-scroll-area">
      <div id="question" class="qtext">질문</div>
      <div id="hint-box" class="hint-box">💡 힌트: <span id="hint-text"></span></div>
      
      <!-- 큼직한 단독 정답판 (복원 완료) -->
      <div id="answer" class="answer"></div>
    </div>
    
    <!-- 카드 내 하단 고정 액션 버튼 -->
    <div id="actions" class="actions">
      <button class="btn-action btn-hint" onclick="showHint()"><i data-lucide="lightbulb"></i> 힌트 보기</button>
      <button class="btn-action btn-ans" onclick="checkAnswer()"><i data-lucide="help-circle"></i> 정답 확인</button>
    </div>
  </div>
  
  <!-- 하단 고정 네비게이션 메뉴 -->
  <div class="nav">
    <button class="nav-btn btn-home" onclick="goHome()"><i data-lucide="home"></i> 홈</button>
    <button id="prev-btn" class="nav-btn btn-prev" onclick="prev()"><i data-lucide="chevron-left"></i> 이전</button>
    <button id="next-btn" class="nav-btn btn-next" onclick="next()"><span>다음</span> <i data-lucide="chevron-right"></i></button>
  </div>
</main>

<script>
let weekIdx = 0, qIdx = 0, set = [];

const MONTHS = [
  {name:"5월 🌸", weeks:["1주차","2주차","3주차","4주차"], indices:[0,1,2,3]},
  {name:"6월 ☔", weeks:["1주차","2주차","3주차","4주차"], indices:[4,5,6,7]},
  {name:"7월 ☀️", weeks:["1주차","2주차","3주차","4주차"], indices:[8,9,10,11]},
  {name:"8월 🌻", weeks:["1주차","2주차","3주차","4주차"], indices:[12,13,14,15]},
  {name:"9월 🍂", weeks:["1주차","2주차","3주차","4주차"], indices:[16,17,18,19]},
  {name:"10월 🍁", weeks:["1주차","2주차","3주차","4주차"], indices:[20,21,22,23]},
  {name:"11월 🍃", weeks:["1주차","2주차","3주차","4주차"], indices:[24,25,26,27]},
  {name:"12월 ❄️", weeks:["1주차","2주차","3주차","4주차"], indices:[28,29,30,31]}
];

/* 정답 확인 시 어르신들을 기쁘게 해드릴 딩동댕 소리 재생 알고리즘 */
function playDingDong() {
  try {
    const ctx = new(window.AudioContext || window.webkitAudioContext)();
    [[523.25, 0], [659.25, .12], [783.99, .24]].forEach(([f, t]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = f;
      g.gain.setValueAtTime(.3, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(.01, ctx.currentTime + t + .5);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .6);
    });
  } catch (e) {}
}

/* 홈 대시보드 리스트 빌드 및 활성화 여부 제어 */
function init() {
  lucide.createIcons();
  const db = document.getElementById('dashboard');
  db.innerHTML = '';
  MONTHS.forEach(m => {
    const box = document.createElement('div');
    box.className = 'month-box';
    box.innerHTML = `<h4><i data-lucide="calendar"></i>${m.name}</h4>`;
    const chips = document.createElement('div');
    chips.className = 'week-chips';
    m.weeks.forEach((w, i) => {
      const btn = document.createElement('button');
      btn.className = 'week-btn';
      btn.textContent = w;
      const idx = m.indices[i];
      const hasData = Array.isArray(WEEKLY_QUIZ_DATA[idx]) && WEEKLY_QUIZ_DATA[idx].length > 0;
      if (!hasData) {
        btn.disabled = true;
        btn.title = '준비 중';
      } else {
        btn.onclick = () => startWeek(idx, m.name + ' ' + w);
      }
      chips.appendChild(btn);
    });
    box.appendChild(chips);
    db.appendChild(box);
  });
  lucide.createIcons();
  setupInteractions(); /* 현대적인 마우스 모션 인터랙션 바인딩 */
}

/* 주차 선택 후 퀴즈 풀이 진입 */
function startWeek(idx, label) {
  set = WEEKLY_QUIZ_DATA[idx];
  weekIdx = idx;
  if (!set || !set.length) {
    alert('데이터가 없어요.');
    return;
  }
  document.getElementById('title').innerHTML = `<i data-lucide="brain-circuit"></i> ${label}`;
  document.getElementById('home').style.display = 'none';
  const q = document.getElementById('quiz');
  q.style.display = 'flex';
  qIdx = 0;
  render();
  lucide.createIcons();
}

/* 개별 문제 화면 렌더링 */
function render() {
  const q = set[qIdx];
  document.getElementById('category').textContent = q.category;
  document.getElementById('question').textContent = q.question;
  document.getElementById('progress').textContent = `${qIdx + 1} / ${set.length}`;
  document.getElementById('hint-text').textContent = q.hint || '';
  document.getElementById('hint-box').style.display = 'none';
  
  // 정답 텍스트 영역 초기화 및 클래스 제거
  const ansText = document.getElementById('answer');
  ansText.style.display = 'none';
  ansText.textContent = q.answer;
  ansText.classList.remove('show');
  
  document.getElementById('actions').style.display = 'flex';
  document.getElementById('prev-btn').disabled = qIdx === 0;
  const nb = document.getElementById('next-btn');
  nb.innerHTML = qIdx === set.length - 1 ? '<span>완료!</span> <i data-lucide="check-circle"></i>' : '<span>다음</span> <i data-lucide="chevron-right"></i>';
  
  // 문제를 전환할 때 카드 스크롤 영역을 항상 맨 위로 초기화해주는 세심한 배려
  const scrollArea = document.querySelector('.card-scroll-area');
  if (scrollArea) {
    scrollArea.scrollTop = 0;
  }
  
  // 문제 진입 시 입체 카드가 페이드인 되며 살짝 솟아오르는 리액션 연출
  const card = document.getElementById('quiz-card');
  if (card) {
    card.style.opacity = '0';
    card.style.transform = 'translateY(15px) perspective(1000px) rotateX(0deg) rotateY(0deg)';
    setTimeout(() => {
      card.style.transition = 'opacity 0.6s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1)';
      card.style.opacity = '1';
      card.style.transform = 'translateY(0) perspective(1000px) rotateX(0deg) rotateY(0deg)';
      // 애니메이션 완료 후 마우스 반응형 전환 속도로 조율
      setTimeout(() => {
        card.style.transition = 'box-shadow 0.3s ease, transform 0.1s ease-out';
      }, 600);
    }, 50);
  }
  
  lucide.createIcons();
}

function showHint() {
  document.getElementById('hint-box').style.display = 'block';
  // 힌트가 노출되면서 카드가 길어질 수 있으므로 부드럽게 스크롤을 끝으로 이동시켜 줌
  const scrollArea = document.querySelector('.card-scroll-area');
  if (scrollArea) {
    setTimeout(() => {
      scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' });
    }, 100);
  }
}

/* 정답 확인 클릭 시 정답판을 부드럽게 화면 중앙에 단독 출현 */
function checkAnswer() {
  document.getElementById('actions').style.display = 'none';
  
  const ansText = document.getElementById('answer');
  ansText.style.display = 'block';
  setTimeout(() => {
    ansText.classList.add('show');
  }, 50);
  
  playDingDong();
  
  // 정답판 활성화 시 카드 최하단 안착을 유도하는 자동 스마트 스크롤링
  const scrollArea = document.querySelector('.card-scroll-area');
  if (scrollArea) {
    setTimeout(() => {
      scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' });
    }, 200);
  }
}

function next() {
  if (qIdx < set.length - 1) {
    qIdx++;
    render();
  } else {
    alert('축하합니다! 이번 주 문제를 모두 풀었습니다.');
    goHome();
  }
}

function prev() {
  if (qIdx > 0) {
    qIdx--;
    render();
  }
}

function goHome() {
  if (confirm('홈으로 돌아가시겠습니까?')) {
    document.getElementById('home').style.display = 'block';
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('title').innerHTML = '<i data-lucide="brain-circuit"></i> 청춘 기억 저장소';
    lucide.createIcons();
  }
}

/* 현대적이고 미려한 마우스 인터랙션을 구현하는 고도화 모듈 */
function setupInteractions() {
  const card = document.getElementById('quiz-card');
  const bgGlow = document.querySelector('.bg-glow');
  
  // 1. 마우스 위치를 실시간 트래킹하여 배경 조명 그라데이션 이동
  document.addEventListener('mousemove', (e) => {
    if (bgGlow) {
      bgGlow.style.left = `${e.clientX}px`;
      bgGlow.style.top = `${e.clientY}px`;
    }
  });

  // 2. 퀴즈 카드 위에서 마우스 이동 감지 -> 3D 입체 틸트 효과 연출
  if (card) {
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left; // 마우스의 카드 내 x 좌표
      const y = e.clientY - rect.top;  // 마우스의 카드 내 y 좌표
      
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      
      // 기울기 각도 계산 (마우스가 중심에서 멀어질수록 최대 약 8도까지 회전하도록 제어)
      const rotateX = -(y - centerY) / 20;
      const rotateY = (x - centerX) / 20;
      
      // 3D Matrix 변환 처리로 한층 깊이감 있는 기울임과 미세한 스케일 업 적용
      card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.015, 1.015, 1.015)`;
      card.style.boxShadow = '0 30px 60px rgba(26, 60, 52, 0.16)';
    });

    // 마우스가 카드를 빠져나갔을 때 원래의 평온한 각도로 부드럽게 리턴
    card.addEventListener('mouseleave', () => {
      card.style.transition = 'box-shadow 0.5s ease, transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1)';
      card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
      card.style.boxShadow = 'var(--shadow)';
      
      // 복원 완료 후 다시 실시간 반응 속도로 복구
      setTimeout(() => {
        card.style.transition = 'box-shadow 0.3s ease, transform 0.1s ease-out';
      }, 500);
    });
  }
}

// 📱 서비스 워커(PWA) 등록 스크립트 (모바일 다운로드 및 오프라인 구동 완벽 연동)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then((reg) => console.log('서비스 워커가 성공적으로 등록되었습니다!', reg))
      .catch((err) => console.error('서비스 워커 등록 실패:', err));
  });
}

window.onload = init;
