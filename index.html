<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청춘 기억 저장소</title>
<!-- 구글 웹폰트: 가독성이 높고 전통적이면서 세련된 '고운 바탕' 폰트 연동 -->
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<!-- 현대적인 벡터 아이콘 라이브러리 Lucide CDN 연동 -->
<script src="https://unpkg.com/lucide@latest"></script>
<!-- 퀴즈 데이터를 담고 있는 외부 자바스크립트 파일 로드 -->
<script src="quizData.js"></script>

<style>
/* 전역 변수 설정: 눈이 편안한 파스텔톤 그린(#1A3C34), 따뜻한 오렌지(#E67E22), 포근한 크림색 배경(#FDF6EC) */
:root {
  --bg: #FDF6EC;
  --primary: #1A3C34;
  --accent: #E67E22;
  --text: #2C3E50;
  --white: #ffffff;
  --green: #A5D6A7;
  --card-bg: rgba(255, 255, 255, 0.95);
  --shadow: 0 15px 35px rgba(26, 60, 52, 0.08);
  --shadow-hover: 0 20px 40px rgba(26, 60, 52, 0.12);
}

/* 스크롤바 디자인 최적화 (어르신들이 다루기 편리하도록 둥글고 부드러운 형태로 마감) */
::-webkit-scrollbar {
  width: 10px;
}
::-webkit-scrollbar-track {
  background: rgba(242, 232, 218, 0.5);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb {
  background: var(--green);
  border-radius: 10px;
  border: 2px solid #FDF6EC;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--primary);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* 화면 전체의 불필요한 스크롤은 숨기고, 내부 컨텐츠만 자연스럽게 스크롤 되도록 유도 */
body {
  font-family: 'Gowun Batang', serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* 눈의 피로를 방지하기 위해 마우스 움직임에 반응하지 않고, 화면 중앙에 부드럽게 고정된 정적 배경 조명 */
.bg-glow {
  position: fixed;
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(165, 214, 167, 0.15) 0%, rgba(230, 126, 34, 0.04) 40%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%); /* 정확히 화면 정중앙에 고정 */
  z-index: 0;
}

header {
  background: var(--primary);
  color: var(--white);
  padding: 1.2rem;
  text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,.15);
  z-index: 10;
  border-bottom: 3px solid var(--green);
}
header h1 {
  font-size: 2.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}

/* 홈 화면 디자인 최적화 */
#home {
  flex: 1;
  padding: 2rem;
  overflow-y: auto;
  background: linear-gradient(to bottom, #FDF6EC, #F2E8DA);
  z-index: 5;
}
.intro {
  text-align: center;
  margin-bottom: 2.5rem;
}
.intro h2 {
  font-size: 2.4rem;
  color: var(--primary);
  margin-bottom: 0.5rem;
}
.intro p {
  font-size: 1.4rem;
  color: #555;
}

.month-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}
.month-box {
  background: var(--white);
  border: 2px solid var(--green);
  border-radius: 24px;
  padding: 1.5rem;
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
}
.month-box:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
}
.month-box h4 {
  font-size: 1.7rem;
  color: #2E7D32;
  margin-bottom: 1.2rem;
  border-bottom: 2px solid #C8E6C9;
  padding-bottom: .6rem;
  display: flex;
  align-items: center;
  gap: 10px;
}
.week-chips {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.week-btn {
  background: #F1F8E9;
  border: 1px solid var(--green);
  padding: .9rem;
  border-radius: 16px;
  font-size: 1.25rem;
  font-weight: bold;
  color: var(--primary);
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: 'Gowun Batang', serif;
}
.week-btn:hover {
  background: var(--primary);
  color: white;
  transform: scale(1.03);
}
.week-btn:disabled {
  opacity: .35;
  cursor: not-allowed;
  background: #eee;
  border-color: #ccc;
}

/* 퀴즈 메인 컨테이너: 가로 정렬(row)로 개편하여 우측 네비게이션을 단독 배치 */
#quiz {
  flex: 1;
  display: none;
  flex-direction: row; /* 가로형(좌측: 문제 카드 / 우측: 네비게이션 버튼바) */
  gap: 24px; /* 좌우 공간 분리 여백 */
  padding: 1.5rem;
  max-width: 1050px; /* 우측 사이드바가 들어가므로 최대 너비 넉넉히 지정 */
  margin: 0 auto;
  width: 100%;
  height: calc(100vh - 90px); /* 헤더를 제외한 전체 높이 활용 */
  z-index: 5;
  align-items: stretch; /* 내부 자식들이 동일한 높이를 갖도록 설정 */
}

/* 퀴즈 좌측 콘텐츠 영역 (카테고리 정보 + 질문 카드) */
.quiz-content-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0; /* Flex 내 텍스트 오버플로우 및 잘림 방지용 핵심 코드 */
  height: 100%;
}

.qheader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.2rem;
  flex-shrink: 0; /* 헤더 크기는 늘어나거나 줄어들지 않고 고정 */
}
.badge {
  background: var(--primary);
  color: white;
  padding: .6rem 1.6rem;
  border-radius: 25px;
  font-size: 1.35rem;
  font-weight: bold;
  box-shadow: 0 4px 8px rgba(26,60,52,0.15);
}
.prog {
  font-size: 1.45rem;
  font-weight: bold;
  color: var(--primary);
}

/* 프리미엄 퀴즈 카드 디자인: 어르신들의 눈 어지러움과 인지 피로를 막기 위해 3D 회전 및 틸트 효과 제거 */
.card {
  background: var(--card-bg);
  backdrop-filter: blur(12px); /* 현대적이고 우아한 글래스모피즘 효과 */
  -webkit-backdrop-filter: blur(12px);
  flex: 1;
  border-radius: 35px;
  padding: 2.5rem;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  margin-bottom: 1.2rem;
  border: 4px solid #F0F4C3;
  position: relative;
  overflow: hidden;
  min-height: 0; /* 플렉스 구조에서 내부 요소 넘침 현상을 강제 방어 */
}

/* 카드 내부 스크롤 가능한 독립 컨텐츠 영역 */
.card-scroll-area {
  flex: 1;
  overflow-y: auto; /* 질문이 길어지거나 힌트/정답이 열려도 이 카드 내부에서만 스크롤이 처리됨 */
  width: 100%;
  padding-right: 8px; /* 스크롤바가 생길 때 컨텐츠가 밀리지 않도록 공간 배려 */
  margin-bottom: 1.5rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 0;
}

.qtext {
  font-size: 2.5rem;
  font-weight: 700;
  color: var(--primary);
  word-break: keep-all;
  margin-bottom: 2rem;
  white-space: pre-wrap;
  text-align: center;
  line-height: 1.5;
}

.hint-box {
  display: none;
  background: #FFF9C4;
  padding: 1.2rem;
  border-radius: 20px;
  font-size: 1.5rem;
  color: #F57F17;
  margin-bottom: 1.5rem;
  width: 100%;
  border-left: 8px solid #FBC02D;
  box-shadow: 0 4px 10px rgba(245,127,23,0.08);
}

/* 큼직하고 뚜렷하게 단독 노출되는 프리미엄 정답판 */
.answer {
  display: none;
  font-size: 3.5rem;
  color: var(--accent);
  font-weight: bold;
  background: #FFF3E0;
  padding: 1.2rem 2rem;
  border-radius: 24px;
  border: 5px dashed var(--accent);
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 20px rgba(230,126,34,0.1);
  opacity: 0;
  transform: scale(0.95);
  transition: opacity 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}
.answer.show {
  display: block;
  opacity: 1;
  transform: scale(1);
}

/* 카드 하단 액션 버튼 배치 영역 */
.actions {
  display: flex;
  gap: 15px;
  width: 100%;
  flex-shrink: 0; /* 콘텐츠 길이에 따라 찌그러지지 않도록 크기 고정 */
}

/* 액션 버튼 공통 스타일 및 미세 물리 기반 애니메이션 효과 */
.btn-action {
  flex: 1;
  padding: 1.2rem;
  font-size: 1.6rem;
  font-weight: bold;
  border-radius: 18px;
  cursor: pointer;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: white;
  font-family: 'Gowun Batang', serif;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}
.btn-action:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.18);
}
.btn-action:active {
  transform: translateY(1px);
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.btn-hint { background: #F39C12; }
.btn-ans { background: #3498DB; }

/* 우측 세로형 네비게이션: 절대로 밀려나지 않고 화면 우측에 고정 배치 */
.nav-sidebar {
  width: 160px; /* 네비게이션 바 고정 폭 */
  display: flex;
  flex-direction: column; /* 세로 배치 구조 */
  gap: 18px; /* 버튼 사이 여백 */
  justify-content: center; /* 카드 높이 중앙에 일치하도록 정렬 */
  flex-shrink: 0; /* 절대 찌그러지거나 잘리지 않도록 크기 보장 */
  height: 100%;
}

/* 세로형 네비게이션 전용 입체 버튼 디자인 */
.nav-btn {
  width: 100%;
  padding: 1.3rem 1rem;
  font-size: 1.55rem;
  font-weight: bold;
  border: none;
  border-radius: 22px;
  cursor: pointer;
  display: flex;
  flex-direction: column; /* 아이콘을 위로, 한글 이름을 아래로 설계하여 높은 직관성 부여 */
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: white;
  font-family: 'Gowun Batang', serif;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
  transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
}
.nav-btn:not(:disabled):hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 10px 25px rgba(0,0,0,0.16);
}
.nav-btn:not(:disabled):active {
  transform: translateY(1px) scale(0.98);
}

.btn-home { background: #7F8C8D; }
.btn-prev { background: #95A5A6; }
.btn-next { background: var(--primary); }

.nav-btn:disabled {
  opacity: .3;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}

/* 스마트폰 및 화면 너비가 좁은 모바일(768px 이하) 환경 최적화 */
@media (max-width: 768px) {
  #quiz {
    flex-direction: row; /* 모바일에서도 세로 버튼 배치의 편리함을 위해 우측 배열 유지 */
    gap: 12px;
    padding: 1rem 0.8rem;
    height: calc(100vh - 80px);
  }
  .nav-sidebar {
    width: 95px; /* 모바일 폭에 맞게 슬림화 */
    gap: 12px;
  }
  .nav-btn {
    padding: 1rem 0.5rem;
    font-size: 1.25rem;
    border-radius: 18px;
    gap: 5px;
  }
  .nav-btn i {
    width: 24px !important;
    height: 24px !important; /* 아이콘 축소 */
  }
  .nav-btn span {
    font-size: 1.1rem;
  }
  .card {
    padding: 1.8rem 1.2rem;
    border-radius: 24px;
    border-width: 3px;
  }
  .qtext {
    font-size: 1.85rem; /* 모바일에서 텍스트가 짤리지 않게 최적화 */
  }
  .actions {
    gap: 10px;
  }
  .btn-action {
    padding: 1rem;
    font-size: 1.35rem;
    border-radius: 14px;
  }
}
</style>
</head>
<body>
<!-- 정적으로 고정된 배경 조명 레이어 -->
<div class="bg-glow"></div>

<header>
  <h1 id="title"><i data-lucide="brain-circuit"></i> 청춘 기억 저장소</h1>
</header>

<!-- 메인 대시보드 화면 -->
<main id="home">
  <div class="intro">
    <h2>어르신, 오늘은 몇 월 문제를 풀까요?</h2>
    <p>매주 새로운 퀴즈로 뇌를 건강하게 지켜보세요!</p>
  </div>
  <div id="dashboard" class="month-grid"></div>
</main>

<!-- 퀴즈 게임 화면: 좌측은 퀴즈 카드, 우측은 네비게이션 사이드바로 분할 -->
<main id="quiz">
  <!-- 좌측: 문제 및 퀴즈 카드 콘텐츠 영역 -->
  <div class="quiz-content-area">
    <div class="qheader">
      <span id="category" class="badge">카테고리</span>
      <span id="progress" class="prog">1 / 20</span>
    </div>
    
    <!-- 퀴즈 카드 몸체 -->
    <div class="card" id="quiz-card">
      <!-- 카드 내부 콘텐츠 영역: 내용이 넘치면 카드 내부에만 스크롤바가 자동 생성됨 -->
      <div class="card-scroll-area">
        <img id="quiz-image" src="" alt="퀴즈 이미지" style="display:none; max-width:90%; max-height:280px; border-radius:20px; margin-bottom:1.5rem; border:3px solid var(--green); box-shadow: 0 8px 20px rgba(0,0,0,0.1);">
        <div id="question" class="qtext">질문</div>
        <div id="hint-box" class="hint-box">💡 힌트: <span id="hint-text"></span></div>
        
        <!-- 큼직한 단독 정답판 -->
        <div id="answer" class="answer"></div>
      </div>
      
      <!-- 카드 내 하단 고정 액션 버튼 -->
      <div id="actions" class="actions">
        <button class="btn-action btn-hint" onclick="showHint()"><i data-lucide="lightbulb"></i> 힌트 보기</button>
        <button class="btn-action btn-ans" onclick="checkAnswer()"><i data-lucide="help-circle"></i> 정답 확인</button>
      </div>
    </div>
  </div>
  
  <!-- 우측: 독립형 세로 네비게이션 메뉴 (어르신들의 동선을 따뜻하게 배려하여 [다음 → 이전 → 홈] 순으로 세로 정렬) -->
  <div class="nav-sidebar">
    <button id="next-btn" class="nav-btn btn-next" onclick="next()">
      <i data-lucide="chevron-right"></i>
      <span>다음</span>
    </button>
    <button id="prev-btn" class="nav-btn btn-prev" onclick="prev()">
      <i data-lucide="chevron-left"></i>
      <span>이전</span>
    </button>
    <button class="nav-btn btn-home" onclick="goHome()">
      <i data-lucide="home"></i>
      <span>홈</span>
    </button>
  </div>
</main>

<script>
let weekIdx = 0, qIdx = 0, set = [];

const MONTHS = [
  {name:"5월 🌸", weeks:["1주차","2주차","3주차","4주차"], indices:[0,1,2,3]},
  {name:"6월 ☔", weeks:["1주차","2주차","3주차","4주차"], indices:[4,5,6,7]},
  {name:"7월 ☀️", weeks:["1주차","2주차","3주차","4주차"], indices:[8,9,10,11]},
  {name:"8월 🌻", weeks:["1주차","2주차","3주차","4주차"], indices:[12,13,14,15]},
  {name:"9월 🍂", weeks:["1주차","2주차","3주차","4주차"], indices:[16,17,18,19]},
  {name:"10월 🍁", weeks:["1주차","2주차","3주차","4주차"], indices:[20,21,22,23]},
  {name:"11월 🍃", weeks:["1주차","2주차","3주차","4주차"], indices:[24,25,26,27]},
  {name:"12월 ❄️", weeks:["1주차","2주차","3주차","4주차"], indices:[28,29,30,31]}
];

/* 정답 확인 시 어르신들을 기쁘게 해드릴 딩동댕 소리 재생 알고리즘 */
function playDingDong() {
  try {
    const ctx = new(window.AudioContext || window.webkitAudioContext)();
    [[523.25, 0], [659.25, .12], [783.99, .24]].forEach(([f, t]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = f;
      g.gain.setValueAtTime(.3, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(.01, ctx.currentTime + t + .5);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .6);
    });
  } catch (e) {}
}

/* 홈 대시보드 리스트 빌드 및 활성화 여부 제어 */
function init() {
  lucide.createIcons();
  const db = document.getElementById('dashboard');
  db.innerHTML = '';
  MONTHS.forEach(m => {
    const box = document.createElement('div');
    box.className = 'month-box';
    box.innerHTML = `<h4><i data-lucide="calendar"></i>${m.name}</h4>`;
    const chips = document.createElement('div');
    chips.className = 'week-chips';
    m.weeks.forEach((w, i) => {
      const btn = document.createElement('button');
      btn.className = 'week-btn';
      btn.textContent = w;
      const idx = m.indices[i];
      const hasData = Array.isArray(WEEKLY_QUIZ_DATA[idx]) && WEEKLY_QUIZ_DATA[idx].length > 0;
      if (!hasData) {
        btn.disabled = true;
        btn.title = '준비 중';
      } else {
        btn.onclick = () => startWeek(idx, m.name + ' ' + w);
      }
      chips.appendChild(btn);
    });
    box.appendChild(chips);
    db.appendChild(box);
  });
  lucide.createIcons();
  setupInteractions(); /* 인터랙션 모듈 구동 */
}

/* 주차 선택 후 퀴즈 풀이 진입 */
function startWeek(idx, label) {
  set = WEEKLY_QUIZ_DATA[idx];
  weekIdx = idx;
  if (!set || !set.length) {
    alert('데이터가 없어요.');
    return;
  }
  document.getElementById('title').innerHTML = `<i data-lucide="brain-circuit"></i> ${label}`;
  document.getElementById('home').style.display = 'none';
  const q = document.getElementById('quiz');
  q.style.display = 'flex';
  qIdx = 0;
  render();
  lucide.createIcons();
}

/* 개별 문제 화면 렌더링 */
function render() {
  const q = set[qIdx];
  document.getElementById('category').textContent = q.category;
  document.getElementById('question').textContent = q.question;
  document.getElementById('progress').textContent = `${qIdx + 1} / ${set.length}`;
  document.getElementById('hint-text').textContent = q.hint || '';
  document.getElementById('hint-box').style.display = 'none';
  
  // 이미지 표시 및 숨김 처리 로직 추가
  const imgElement = document.getElementById('quiz-image');
  if (q.image) {
    imgElement.src = q.image;
    imgElement.style.display = 'block';
  } else {
    imgElement.src = '';
    imgElement.style.display = 'none';
  }
  
  // 정답 텍스트 영역 초기화 및 클래스 제거
  const ansText = document.getElementById('answer');
  ansText.style.display = 'none';
  ansText.textContent = q.answer;
  ansText.classList.remove('show');
  
  document.getElementById('actions').style.display = 'flex';
  document.getElementById('prev-btn').disabled = qIdx === 0;
  
  // 세로 정렬 네비게이션 스타일에 부합하도록 [아이콘(위) -> 글씨(아래)] 렌더링 유지
  const nb = document.getElementById('next-btn');
  nb.innerHTML = qIdx === set.length - 1 
    ? '<i data-lucide="check-circle"></i><span>완료!</span>' 
    : '<i data-lucide="chevron-right"></i><span>다음</span>';
  
  // 문제를 전환할 때 카드 스크롤 영역을 항상 맨 위로 초기화해주는 세심한 배려
  const scrollArea = document.querySelector('.card-scroll-area');
  if (scrollArea) {
    scrollArea.scrollTop = 0;
  }
  
  // 화면 요동침 없이 자연스럽게 페이드인 리액션만 적용
  const card = document.getElementById('quiz-card');
  if (card) {
    card.style.opacity = '0';
    setTimeout(() => {
      card.style.transition = 'opacity 0.5s ease-out';
      card.style.opacity = '1';
    }, 50);
  }
  
  lucide.createIcons();
}

function showHint() {
  document.getElementById('hint-box').style.display = 'block';
  // 힌트가 노출되면서 카드가 길어질 수 있으므로 부드럽게 스크롤을 끝으로 이동시켜 줌
  const scrollArea = document.querySelector('.card-scroll-area');
  if (scrollArea) {
    setTimeout(() => {
      scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' });
    }, 100);
  }
}

/* 정답 확인 클릭 시 정답판을 부드럽게 화면 중앙에 단독 출현 */
function checkAnswer() {
  document.getElementById('actions').style.display = 'none';
  
  const ansText = document.getElementById('answer');
  ansText.style.display = 'block';
  setTimeout(() => {
    ansText.classList.add('show');
  }, 50);
  
  playDingDong();
  
  // 정답판 활성화 시 카드 최하단 안착을 유도하는 자동 스마트 스크롤링
  const scrollArea = document.querySelector('.card-scroll-area');
  if (scrollArea) {
    setTimeout(() => {
      scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' });
    }, 200);
  }
}

function next() {
  if (qIdx < set.length - 1) {
    qIdx++;
    render();
  } else {
    alert('축하합니다! 이번 주 문제를 모두 풀었습니다.');
    goHome();
  }
}

function prev() {
  if (qIdx > 0) {
    qIdx--;
    render();
  }
}

function goHome() {
  if (confirm('홈으로 돌아가시겠습니까?')) {
    document.getElementById('home').style.display = 'block';
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('title').innerHTML = '<i data-lucide="brain-circuit"></i> 청춘 기억 저장소';
    lucide.createIcons();
  }
}

/* 어르신들의 인지적 피로 방지를 위해 마우스 트래킹 3D 흔들림 효과 전면 비활성화 */
function setupInteractions() {
  // 마우스 트래킹 이벤트 등록을 하지 않고, 화면 구성 요소들을 정적으로 고정하여 시각적 차분함을 유지합니다.
}

/* [신규 기능] 어르신들이 쉽고 빠르게 퀴즈를 푸실 수 있도록 키보드 Enter 및 Space 키 이벤트 바인딩 */
document.addEventListener('keydown', (e) => {
  // 퀴즈 진행 화면이 활성화되어 있을 때만 동작하도록 제어
  const quizSection = document.getElementById('quiz');
  if (quizSection && quizSection.style.display === 'flex') {
    
    // 1. Enter 키 입력 시: [정답 확인] 또는 [다음 문제] 실행
    if (e.key === 'Enter') {
      e.preventDefault(); // Enter 키 입력 시 발생할 수 있는 브라우저 기본 포커싱 동작 방지
      
      const ansText = document.getElementById('answer');
      // 만약 정답 확인이 아직 안 된 상태라면, Enter 키로 '정답 확인' 실행
      if (ansText.style.display === 'none' || !ansText.classList.contains('show')) {
        checkAnswer();
      } else {
        // 이미 정답을 확인했다면, Enter 키로 '다음 문제' 혹은 '완료' 진행
        next();
      }
    }
    
    // 2. Space 키 입력 시: [힌트 보기] 실행
    if (e.key === ' ' || e.key === 'Spacebar' || e.code === 'Space') {
      e.preventDefault(); // 스페이스바를 누를 때 브라우저 창이 덜컥거리며 밑으로 화면 스크롤되는 기본 기능 완벽 차단
      
      const hintBox = document.getElementById('hint-box');
      // 힌트가 아직 화면에 표시되지 않은 상태라면 스페이스바로 힌트 보기 호출
      if (hintBox && hintBox.style.display !== 'block') {
        showHint();
      }
    }
  }
});

// 📱 서비스 워커(PWA) 등록 스크립트 (모바일 다운로드 및 오프라인 구동 완벽 연동)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then((reg) => console.log('서비스 워커가 성공적으로 등록되었습니다!', reg))
      .catch((err) => console.error('서비스 워커 등록 실패:', err));
  });
}

window.onload = init;
</script>
